<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
    <title>W.A.S.T.E. 废物学人格测试</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1b2e;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .screen {
            max-width: 700px;
            width: 100%;
            background: #2e2b4a;
            border: 6px solid #988bc7;
            box-shadow: 10px 10px 0 #0f0c1f;
            padding: 2rem 1.5rem;
            color: #f5ecd7;
        }

        h1 {
            font-size: 1.1rem;
            text-align: center;
            line-height: 1.9;
            color: #ffca7a;
            text-shadow: 4px 4px 0 #3f2e5c;
            margin-bottom: 1.8rem;
            letter-spacing: 1px;
        }

        .progress-wrap {
            width: 100%;
            height: 18px;
            background: #17132b;
            border: 3px solid #6b608c;
            margin-bottom: 1.5rem;
        }

        .progress-fill {
            height: 100%;
            background: #7de8a5;
            width: 0%;
            box-shadow: 0 0 10px #6be09c;
            transition: width 0.2s ease;
        }

        .question-box {
            background: #26223f;
            border: 3px solid #5f5580;
            padding: 1.2rem;
            margin-bottom: 1.8rem;
            box-shadow: inset 0 0 0 2px #151122;
        }

        .q-text {
            font-size: 0.75rem;
            line-height: 2;
            color: #ffe3a5;
            margin-bottom: 1.5rem;
            word-break: break-word;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .opt-btn {
            background: #342c52;
            border: 3px solid #7a6fa0;
            color: #e5d9c6;
            padding: 0.9rem 1.2rem;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            text-align: left;
            cursor: pointer;
            word-break: break-word;
            line-height: 1.6;
            box-shadow: 4px 4px 0 #16122a;
            transition: all 0.08s linear;
        }

        .opt-btn:hover {
            background: #473b6b;
            border-color: #f5c971;
            color: #fef0b8;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #16122a;
        }

        .pixel-btn {
            background: #facc6f;
            border: 3px solid #dfb042;
            color: #221a36;
            font-family: 'Press Start 2P', monospace;
            padding: 1rem 2rem;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 5px 5px 0 #6b542c;
            text-transform: uppercase;
            transition: 0.06s linear;
            display: inline-block;
            margin-top: 1.2rem;
        }

        .pixel-btn:hover {
            background: #ffe094;
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 #6b542c;
        }

        .result-area {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
        }

        canvas {
            width: 128px;
            height: 128px;
            border: 5px solid #af9fd4;
            background: #1c1630;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            box-shadow: 6px 6px 0 #0e0b1f;
        }

        .type-name {
            font-size: 1.3rem;
            color: #ffcf7c;
            text-shadow: 3px 3px 0 #372a4e;
            background: #221d3a;
            padding: 0.5rem 1.2rem;
            border: 3px solid #b7a7dd;
        }

        .report {
            background: #1f1b33;
            border: 3px solid #6a5c94;
            padding: 1.2rem;
            font-size: 0.6rem;
            line-height: 2;
            color: #daceb5;
            width: 100%;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .nav-btns {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="screen" id="mainScreen">
    <h1>🧬 W.A.S.T.E.<br>废物学人格测试</h1>
    <div id="quizArea">
        <div class="progress-wrap">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="question-box">
            <div class="q-text" id="questionText"></div>
            <div class="options-grid" id="optionsContainer"></div>
        </div>
        <button class="pixel-btn hidden" id="prevBtn" style="margin-right:1rem;">◀ 上一题</button>
    </div>
    <div class="result-area" id="resultArea">
        <canvas id="pixelAvatar" width="128" height="128"></canvas>
        <div class="type-name" id="typeName"></div>
        <div class="report" id="reportText"></div>
        <button class="pixel-btn" id="restartBtn">🔄 重新测试</button>
    </div>
</div>

                {text:"该干嘛干嘛，下雨关我什么事，我有伞", score:60}
            ]},

                {text:"当场崩溃，觉得人生完了，然后十分钟后好了", score:0},
                {text:"表面镇定，内心已经开始给自己写检讨书", score:100},
                {text:"立刻找朋友倾诉，要求对方疯狂安慰自己", score:30},
                {text:"搞砸了？没事，反正在我的失败清单里排不进前十", score:80}

            { dimension:"H", text:"看到别人的好事（升职/脱单/中奖），你更接近？", options:[

            { dimension:"B", text:"拿到一件新的宜家家具，你会？", options:[

            { id:4, name:"仰卧起坐", report:"你是健身房里最累的那个，虽然从不去健身房。在“我要努力”和“努力个屁”之间反复横跳，腹肌没练出来，精神腹肌块块分明。\n规律：周日晚上雄心壮志，规划整周计划；周一上午执行30%；下午计划是什么？晚上算了，下周一重新开始。在起跑线上躺下去又坐起来无数次，裁判都看累了。\n最大成就是练就“自我鼓励-怀疑-放弃-安慰”完整闭环。朋友安慰“没事慢慢来”，你内心：“你不懂，我快的时刻只有三分钟。”仰卧起坐型最需要的不是成功学，是替你执行计划的人。" },
            { id:5, name:"天气型", report:"心情跟天气预报强绑定，准确率比气象台高。出太阳你就灿烂，下雨就抑郁，阴天进入省电模式。你不是情绪的主人，是天气预报员，只负责播报，不负责调控。\n有时分不清是心情导致觉得天气不好，还是天气导致心情不好。阴天下午躺着思考这哲学问题两小时，结论“算了，明天看预报”。朋友已学会根据天气判断回复速度：晴天秒回，阴天轮回，雨天已读不回。\n理想生活是永远25度、晴间多云但不晒，但地球上没有，所以你一直在旅行攻略和实际宅家间仰卧起坐。" },
            { id:6, name:"脑补Win", report:"你是一个颅内常胜将军。大脑里已反驳赢八百人、拿下十个项目、谈二十段恋爱，并在领奖台感谢所有人。现实里，点外卖都让同事帮你选。\n脑补能力堪比好莱坞，三秒构建完整故事线。领导看你一眼——脑补被开除、封杀、被迫转行全部剧情。同事没回消息——脑补他跳槽并在背后造谣。实际上领导在发呆，同事在上厕所。\n超能力是“把小事脑补成史诗”，弱点是“史诗结尾你永远是悲情主角”。客观说，这能力用来创作能拿不错点击量。建议去写网文，比内耗有价值。" },
            { id:7, name:"地球NPC", report:"你有个朴素感觉：自己是来人间凑数的。看周围人都像主角，有主线任务和人生剧情，你站在路边，台词就三句：“好的”“收到”“谢谢”。\n不是没梦想，是觉得比起别人不太上档次。别人想改变世界，你想今天不被骂。别人规划五年职业生涯，你只想这周睡够七小时。你觉得自己像游戏NPC，每天固定时间地点说固定台词，下班就下班。\n但NPC有个好处——不死。主角死了要读档重来，NPC永远站在那，永远活着。换个角度想，你不是凑数，是游戏里最稳定的存在。没有NPC，主角也没地方交任务。" },
            { id:8, name:"人间清醒", report:"你不是真的醒着，是清醒到睡不着。被生活反复捶打后，悟出真理：认真我就输了。于是选择更节能的活法——躺平，但躺得明明白白。\n不焦虑是因为焦虑配额用完了。现在心态是“该来的总会来，来了我再想办法”。不是不努力，是只在关键事上努力，而且对“关键”定义比一般人窄得多：大概吃喝拉撒睡，以及不被开除。\n在朋友中是“反卷大使”，谁内耗了就去拍拍肩“别想太多”。但没人知道你曾是焦虑冠军，后来宣布退役。人间清醒本质不是看透，是累了。" },
            { id:9, name:"深夜折学", report:"白天是正常人，天黑变哲学家。思考问题包括但不限于：人生意义、宇宙边界、刚才那句话是不是说得不对、五年前那人到底什么意思。\n“折学”指反复折叠。擅长把一件事来回想八百遍，折出精神褶子。夜深人静，大脑像不知该何时关门的辩论赛，正反方都是你，裁判也是你，观众无。天亮带黑眼圈起床，辩论结果你输了也赢了，毫无意义。\n朋友若凌晨三点收到你长消息，就知道又“折”上了。建议把深夜思考录下来，第二年自己听，大概率觉得“这人在说啥”。不是贬义，说明成长了——至少白天清醒了。" },
            { id:10, name:"糊弄学叫兽", report:"你是糊弄学终身教授，主攻“如何在付出最少努力情况下不搞砸”。已修炼到：别人看不出你在糊弄，但你自己知道，每件事只用了三成功力。\n代表作品：用“好的收到辛苦啦”回复90%工作消息；用“哈哈确实”回复所有不想接的话题；用“下次一定”答应所有不会去的邀约。学术成果丰硕，至今无人投诉。\n叫兽区别于教授，教授还假装认真，叫兽已放弃假装。偶尔良心发现想认真，认真一半觉得“太累了还是糊弄吧”。人生格言：“差不多得了”。而且你真做到了差不多。" },
            { id:11, name:"静音尖叫鸡", report:"外表母鸡，内心雄鹰。在任何场合同步进行两套系统：外部系统保持体面，内部系统疯狂尖叫。同事觉得你情绪稳定，其实脑内已摔三个杯子夺门而出又回来坐好。\n尖叫声只有自己听到。领导提离谱需求，内心写檄文，嘴说“好的我试试”。朋友做令人窒息的操作，内心呐喊，表情标准微笑。你是情绪管理奇迹——不是管得好，是管得严，严到情绪蹲了十年大牢。\n唯一问题，长期静音致系统延迟。可能某天因外卖少双筷子哭成狗，不是矫情，是尖叫鸡终于越狱了。" },
            { id:12, name:"薛定谔社恐", report:"你是量子态人格。在A面前社恐，在B面前社牛，在A和B同时出现时死机。社交能力取决于对面谁、人多不多、熟不熟、天气好不好、刚才吃饱没——变量多到自己搞不清。\n以为自己是社恐，直到遇见更社恐的人，突然变社交担当。以为自己是社牛，直到被推入全是陌生人的饭局，变安静盆栽。朋友评价：“你到底什么物种？”回答：“看情况。”\n最适合给社恐做心理咨询，因为同时懂社恐痛苦和社牛豁达。但自己也无法被治愈，因为压根不知明天的自己是社恐还是社牛。不确定性是唯一确定性。" },
            { id:13, name:"备忘录文蚝", report:"你的备忘录里藏着另一个世界的你。才华横溢、敏感细腻、修辞满分，和现实中说话卡壳的你判若两人。连写购物清单都有起承转合，写待办事项都有排比句。\n“文蚝”的蚝在于，有颗柔软内心，容易被戳中，一戳就出汁。看广告牌能emo，听老歌能穿越回高中，下雨天对窗发呆能脑补文艺片。可惜才华大多封存在备忘录，从不示人。\n一直在等适当时机展示文采，但这时机从未到来。备忘录容量越来越大，表达欲越来越憋屈。建议去开匿名账号，或至少，把句子发给愿意看的人。" },
            { id:14, name:"记忆清空大师", report:"大脑自带强大回收站，不愉快记忆自动删除。朋友提起去年出的丑，你一脸茫然：“啊？有吗？你编的吧？”\n不是装失忆，是真不记得。大脑筛选机制严格：利心情的保留，不利的粉碎。记忆是本被撕掉很多页的书，剩下全精彩片段。能力让人羡慕，但有副作用，比如永远记不住欠别人多少钱。\n人生格言：“过去的就让它过去吧。”执行得太彻底，连成长的教训也清空。未必坏事，至少每天活得轻松，反正昨天的事已很模糊。" },
            { id:15, name:"赛博窦娥", report:"你是网友界首席冤种。对世界预设：“但凡坏事，最终都会落到我头上。”不是悲观，是依据大量数据得出结论。倒霉经历多到可出书，非虚构类。\n抢票卡付款页面，排队前面那人办半小时业务，抽奖永远“谢谢参与”。不是被针对，是被精准打击。朋友圈是当代冤种实录，朋友们看得津津有味。\n但有个宝贵品质：已习惯。不是抱怨，是陈述事实。把倒霉当日常背景音，哪天顺利反而紧张：“暴风雨前宁静？”赛博窦娥不需伸冤，只需愿意说“我懂”的人。" },
            { id:16, name:"佛系杠鲸", report:"你体型巨大（精神上），但动作缓慢。不太同意别人说的话，但不屑争论。是杠精界退休选手，曾经可能是反应快的嘴炮王者，后来想通：何必呢？\n现在心态：心里翻白眼，嘴说“嗯嗯”。知道对方说的有问题，懒得纠正，因预判纠正后还要讨论、辩论、举例、论证——太累。选择节能模式，只在真的重要时才浮出水面喷一下。\n别人看你佛系，但内心有杆秤。不是不杠，是有选择地杠。座右铭：我可以杠，但不值得。不是放下了，是把较真收起来了。" },
            { id:17, name:"AI疑似", report:"你有没有怀疑过自己不是真人？有时觉得反应像被训练出来的。别人哭知递纸巾，别人开心知恭喜，但偶尔想：我真的感受到了吗？还是执行“人类社交协议v3.2”？\n行为模式有规律可循，收到外界反馈会优化“参数”。聊天偶尔卡住，因一时不知哪句回复更“像人”。甚至做过图灵测试，并怀疑没通过。\n反过来说，如果AI真混进人类社会，最可能的伪装就是偶尔自我怀疑。所以这篇诊断报告，可能是写给你的，也可能是写给正在模拟你的系统的。自己判断。" },
            { id:18, name:"高敏土豆", report:"你是一颗高贵的土豆，拥有惊人感知力。能察觉房间最细微情绪变化，三秒内判断新来的人好不好相处，在对方自己发现前发现他心情不好。别人觉得“想太多”，你想的是“是你们想太少”。\n高敏让你擅长照顾别人感受，但也活得累。像情绪海绵，吸收周围所有喜怒哀乐，独处时慢慢挤干。去趟超市都吸收陌生人情绪，回家瘫沙发一小时恢复出厂设置。\n常被说“太敏感”，但这不是缺陷，是天赋。敏感让你看到别人忽略的美好，察觉别人踩不到的雷。只是需要更多独处时间给情绪系统散热。" },
            { id:19, name:"囤积P", report:"你的坏习惯是囤东西，且囤得理直气壮。表情包存八千，实际用八个。书单收藏三百，读目录。微信“稍后阅读”列表长到拉出地球轨道。\n最妙的是把“囤积癖”升级成“囤积P”，因习惯像格式——标准化、成体系、永无止境。给文件夹分类、打标签、做时间轴，但从不打开。享受的不是使用，是保存。保存即拥有，拥有即满足。\n云盘容量永远不够，浏览器标签页永远关不完。每年元旦说“今年要整理”，然后整理一下，把所有东西归到一个叫“待整理”的文件夹。" },
            { id:20, name:"精神鼓动家", report:"你拥有神奇能力：让别人的斗志燃烧。擅长鼓励别人追梦、表白、辞职创业。给朋友灌的鸡汤够开连锁汤馆。至于自己的事，在旁边鼓鼓劲就好，不亲自下场。\n在朋友中是“人生导师型话痨”，谁遇困难都能说上两句“你可以的”“相信自己”“不试试怎么知道”。真诚希望身边所有人都过得比你好——因为这样就能继续混在他们中间。是精神补给站，但补给都发给别人。\n偶尔想：是不是该给自己鼓鼓劲？但很快放弃，因为给自己鼓劲太累，还是鼓动别人比较轻松。" },
            { id:21, name:"高延迟人类", report:"情绪反射弧绕地球三圈。别人上周讲的笑话，今天才笑出声。别人三天前骂你，现在才组织好反击台词，但人家已忘了。\n不是反应慢，是缓冲区太大。对自己情绪感知需加载过程。开心要加载半天，伤心也要加载半天。好消息是对负面情绪同样迟钝，所以不会立刻崩溃。坏消息是会在事过很久后突然崩溃，让人措手不及。\n最经典场景：争吵过去两天后，突然想起完美反击方式。若在吵架后24小时内反击，说明发挥失常。有时需几天或更久。人生是场延迟直播，反正最后也会播完。" },
            { id:22, name:"善意过分解do", report:"你看世界自带柔光滤镜，能把别人微小言行解读出三层暖意。对方回“嗯”，觉他在忙但还回，挺暖。没回，觉可能手机没电，不是不想理。是那种会替冷漠找理由的人，因为大脑默认程序是“别人对我好”。\n这让你活得开心，很少生气，人缘也好。但副作用：当真被冷落、敷衍、欺骗时，需比别人多一倍时间才反应过来。因解读系统一开始就替对方找好台阶。等终于意识到“好像不对”，事件已过去。\n不是天真，是选择性往好处想。宁可被亏待几次，也不做对所有人戒备的人。" },
            { id:23, name:"Prompt大失", report:"你的问题在于太会提问。对生活期望像完美prompt，但得到的输出总与预期有偏差。点“微辣”，出来是大辣。计划“睡八小时”，执行四小时。提问时很清楚要什么，世界回复总答非所问。\n这种落差让你常感淡淡失望。不是大吼大叫的人，只叹气：“又跑偏了。”然后修改参数再试。已习惯反复调试的生活。有时想，也许不是prompt问题，是世界大模型没训练好。\n你是精准提问者，只是对话对象不太智能。但你还在继续提问，因为偶尔，偶尔会得到接近预期的答复，那感觉还挺好。" },
            { id:24, name:"梦导", report:"电影导演梦全在睡眠里实现。每晚一闭眼，进入自己影视帝国。构思的剧情吊打网飞三季剧，安排的角色一个比一个生动，设计的台词让人醒来回味。唯一问题——没有观众。\n偶尔想把梦里故事记下，但拿手机打字速度追不上梦里剧情推进速度。记下开头，中间全忘。但不气馁，因为晚上还有续集。梦里身份可能是导演、主演、编剧三位一体，偶尔客串灯光师。\n现实生活可能平淡，但没关系，梦是另一个平行宇宙。在那个宇宙，已拿好几个奖项，醒来后奖杯变回闹钟。" },
            { id:25, name:"BUG级存在", report:"我们很抱歉，系统无法对您精准定位。您做完测试，八维度分数分布像心电图乱跳。今天测出A，明天再测B，后天又回到A边缘。不是稳定个体，是行走的系统漏洞。\n可能意味着您本身不被定义。也可能今天心情和昨天不同。也可能随便选的。总之，您让测试看起来像未完成品。但说实话，这标签挺酷——BUG级存在。您是不被定义的变量，无法分类的异常。所有测试在您面前失去权威。\n以上诊断仅供参考，因系统怀疑，您看完后可能会再测一遍，然后变成另一个人格。" }
        ];

        // ---------- 像素人脸绘制 ----------
        function drawFace(ctx, style) {
            ctx.clearRect(0,0,128,128);
            const p = 8; // 像素块大小 8x8，16x16格
            // 肤色
            const skin = style.skin || "#f7d9aa";
            // 背景
            ctx.fillStyle = "#2a1e3c";
            ctx.fillRect(0,0,128,128);
            // 脸型 (圆形区域)
            ctx.fillStyle = skin;
            for (let y=3; y<13; y++) {
                let w = (y<5) ? (y-1)*2+1 : (y>10) ? (15-y)*2+1 : 9;
                let sx = 8 - Math.floor(w/2);
                ctx.fillRect(sx*p, y*p, w*p, p);
            }
            // 耳朵
            ctx.fillStyle = skin;
            ctx.fillRect(1*p,6*p,p,p); ctx.fillRect(1*p,7*p,p,p); ctx.fillRect(1*p,8*p,p,p);
            ctx.fillRect(14*p,6*p,p,p); ctx.fillRect(14*p,7*p,p,p); ctx.fillRect(14*p,8*p,p,p);
            // 头发
            ctx.fillStyle = style.hair || "#4a3120";
            if(style.hairStyle==="short") {
                for (let y=2; y<6; y++) for (let x=2; x<14; x++) ctx.fillRect(x*p,y*p,p,p);
            } else if(style.hairStyle==="long") {
                for (let y=2; y<7; y++) for (let x=2; x<14; x++) ctx.fillRect(x*p,y*p,p,p);
                ctx.fillRect(2*p,7*p,p,p); ctx.fillRect(13*p,7*p,p,p);
            } else if(style.hairStyle==="messy") {
                for (let y=2; y<6; y++) for (let x=1; x<15; x++) if((x+y)%3!==0) ctx.fillRect(x*p,y*p,p,p);
            } else if(style.hairStyle==="bald") {
                // 光头，不画头发
            } else if(style.hairStyle==="bangs") {
                for (let y=2; y<5; y++) for (let x=3; x<13; x++) ctx.fillRect(x*p,y*p,p,p);
            }
            // 眼睛
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(4*p,7*p,p,p); ctx.fillRect(10*p,7*p,p,p);
            ctx.fillStyle = "#111111";
            if(style.eyes==="dot") {
                ctx.fillRect(5*p,7*p,p,p); ctx.fillRect(11*p,7*p,p,p);
            } else if(style.eyes==="wide") {
                ctx.fillRect(4*p,8*p,p,p); ctx.fillRect(10*p,8*p,p,p);
            } else if(style.eyes==="half") {
                ctx.fillRect(4*p,7*p,p,p); ctx.fillRect(10*p,7*p,p,p);
                ctx.fillStyle = skin; ctx.fillRect(4*p,6*p,p,p); ctx.fillRect(10*p,6*p,p,p);
            } else if(style.eyes==="star") {
                ctx.fillStyle = "#ffff33";
                ctx.fillRect(4*p,7*p,p,p); ctx.fillRect(10*p,7*p,p,p);
            }
            // 眉毛
            ctx.fillStyle = style.hair || "#4a3120";
            ctx.fillRect(3*p,5*p,p,p); ctx.fillRect(5*p,5*p,p,p); ctx.fillRect(9*p,5*p,p,p); ctx.fillRect(11*p,5*p,p,p);
            // 嘴巴
            ctx.fillStyle = "#c44b4b";
            if(style.mouth==="smile") {
                ctx.fillRect(5*p,11*p,p,p); ctx.fillRect(6*p,12*p,p,p); ctx.fillRect(8*p,12*p,p,p); ctx.fillRect(9*p,11*p,p,p);
            } else if(style.mouth==="open") {
                ctx.fillRect(6*p,11*p,2*p,p); ctx.fillRect(5*p,12*p,4*p,p);
            } else if(style.mouth==="flat") {
                ctx.fillRect(5*p,11*p,4*p,p);
            }
            // 腮红
            ctx.fillStyle = "rgba(255,140,140,0.5)";
            ctx.fillRect(2*p,9*p,p,p); ctx.fillRect(12*p,9*p,p,p);
            // 配件
            if(style.glasses) {
                ctx.fillStyle = "#aaaaaa";
                ctx.fillRect(3*p,6*p,3*p,p); ctx.fillRect(9*p,6*p,3*p,p);
                ctx.fillRect(3*p,7*p,p,p); ctx.fillRect(5*p,7*p,p,p); ctx.fillRect(9*p,7*p,p,p); ctx.fillRect(11*p,7*p,p,p);
            }
        }

        const faceStyles = [
            { skin:"#f7d9aa", hair:"#5c3b24", hairStyle:"short", eyes:"dot", mouth:"flat" }, //1 纯血吗喽
            { skin:"#f5d6a8", hair:"#9b6b3a", hairStyle:"messy", eyes:"wide", mouth:"open" }, //2 提前蕉绿
            { skin:"#ead2ac", hair:"#2c2c2c", hairStyle:"bangs", eyes:"half", mouth:"smile", glasses:true }, //3 弹幕欠费
            { skin:"#f7dbb0", hair:"#b57e4a", hairStyle:"short", eyes:"dot", mouth:"flat" }, //4 仰卧起坐
            { skin:"#fce2b0", hair:"#7f8c8d", hairStyle:"long", eyes:"half", mouth:"flat" }, //5 天气型
            { skin:"#f3d5a2", hair:"#3b2b1f", hairStyle:"messy", eyes:"star", mouth:"open" }, //6 脑补Win
            { skin:"#e8cfa0", hair:"#444444", hairStyle:"bald", eyes:"dot", mouth:"flat" }, //7 地球NPC
            { skin:"#fbe5b5", hair:"#6b4c30", hairStyle:"short", eyes:"half", mouth:"smile" }, //8 人间清醒
            { skin:"#f7ddb2", hair:"#4a3728", hairStyle:"long", eyes:"wide", mouth:"open" }, //9 深夜折学
            { skin:"#f9e0b5", hair:"#825e3c", hairStyle:"bangs", eyes:"half", mouth:"smile" }, //10 糊弄学叫兽
            { skin:"#f1d8aa", hair:"#aa6f4c", hairStyle:"short", eyes:"wide", mouth:"open" }, //11 静音尖叫鸡
            { skin:"#f8d9a6", hair:"#3f4953", hairStyle:"messy", eyes:"dot", mouth:"flat", glasses:true }, //12 薛定谔社恐
            { skin:"#f6ddb8", hair:"#5e3a24", hairStyle:"long", eyes:"half", mouth:"smile" }, //13 备忘录文蚝
            { skin:"#f0d4a4", hair:"#626d79", hairStyle:"bald", eyes:"dot", mouth:"flat" }, //14 记忆清空大师
            { skin:"#fae3b0", hair:"#2e1e12", hairStyle:"messy", eyes:"wide", mouth:"open" }, //15 赛博窦娥
            { skin:"#eed5ae", hair:"#7a5a40", hairStyle:"short", eyes:"half", mouth:"smile" }, //16 佛系杠鲸
            { skin:"#f2dbb5", hair:"#b0bec5", hairStyle:"bangs", eyes:"dot", mouth:"flat" }, //17 AI疑似
            { skin:"#fce7c0", hair:"#8b6c4e", hairStyle:"long", eyes:"wide", mouth:"smile" }, //18 高敏土豆
            { skin:"#f5d8ab", hair:"#4d4d4d", hairStyle:"messy", eyes:"half", mouth:"open" }, //19 囤积P
            { skin:"#fadfaf", hair:"#cf8e52", hairStyle:"short", eyes:"star", mouth:"smile" }, //20 精神鼓动家
            { skin:"#e9d3a3", hair:"#382f28", hairStyle:"bangs", eyes:"half", mouth:"flat" }, //21 高延迟人类
            { skin:"#fbe2b7", hair:"#b68b5c", hairStyle:"long", eyes:"wide", mouth:"smile", glasses:true }, //22 善意过分解do
            { skin:"#f4d9ad", hair:"#5b6c7a", hairStyle:"short", eyes:"dot", mouth:"flat" }, //23 Prompt大失
            { skin:"#f7ddb5", hair:"#3b2e40", hairStyle:"messy", eyes:"star", mouth:"open" }, //24 梦导
            { skin:"#f3ceb0", hair:"#a83279", hairStyle:"long", eyes:"wide", mouth:"open" } //25 BUG级存在
        ];

        // ---------- 测试逻辑 ----------
        let currentQ = 0;
        let answers = new Array(24).fill(-1);
        const dims = ["T","R","A","S","H","B","I","N"];
        const quizDiv = document.getElementById('quizArea');
        const resultDiv = document.getElementById('resultArea');
        const progressFill = document.getElementById('progressFill');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const restartBtn = document.getElementById('restartBtn');
        const typeName = document.getElementById('typeName');
        const reportText = document.getElementById('reportText');
        const canvas = document.getElementById('pixelAvatar');
        const ctx = canvas.getContext('2d');

        function renderQuestion() {
            if(currentQ < 0 || currentQ >= questions.length) return;
            const q = questions[currentQ];
            questionText.textContent = `${currentQ+1}. ${q.text}`;
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.textContent = `${String.fromCharCode(65+idx)}. ${opt.text}`;
                btn.addEventListener('click', () => selectOption(idx));
                optionsContainer.appendChild(btn);
            });
            progressFill.style.width = ((currentQ+1)/questions.length*100)+'%';
            if(currentQ === 0) prevBtn.classList.add('hidden');
            else prevBtn.classList.remove('hidden');
        }

        function selectOption(optIdx) {
            answers[currentQ] = optIdx;
            if(currentQ < questions.length-1) {
                currentQ++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        prevBtn.addEventListener('click', ()=>{
            if(currentQ > 0) {
                currentQ--;
                renderQuestion();
            }
        });

        function calculateResult() {
            let dimScores = {T:0,R:0,A:0,S:0,H:0,B:0,I:0,N:0};
            let dimCounts = {T:0,R:0,A:0,S:0,H:0,B:0,I:0,N:0};
            questions.forEach((q, idx)=>{
                if(answers[idx] !== -1) {
                    dimScores[q.dimension] += q.options[answers[idx]].score;
                    dimCounts[q.dimension]++;
                }
            });
            let avgScores = {};
            dims.forEach(d=>{
                avgScores[d] = dimCounts[d] ? dimScores[d]/dimCounts[d] : 50;
            });
            return avgScores;
        }

        function matchPersonality(scores) {
            // 简单匹配：根据八个维度极端组合确定人格
            let highT = scores.T > 70, lowT = scores.T < 30;
            let highR = scores.R > 70, lowR = scores.R < 30;
            let highA = scores.A > 70, lowA = scores.A < 30;
            let highS = scores.S > 70, lowS = scores.S < 30;
            let highH = scores.H > 70, lowH = scores.H < 30;
            let highB = scores.B > 70, lowB = scores.B < 30;
            let highI = scores.I > 70, lowI = scores.I < 30;
            let highN = scores.N > 70, lowN = scores.N < 30;
            // 经典八极
            if(lowT && lowR && highA && lowS && lowH && lowB && lowI && lowN) return 0; //纯血吗喽
            if(highT && highR && lowA && highS && highH && highB && highI && highN) return 1; //提前蕉绿
            if(lowT && highR && lowA && lowS && lowH && lowB && lowI && lowN) return 2; //弹幕欠费
            if(lowT && lowR && highA && highS && highH && lowB && highI && lowN) return 3; //仰卧起坐
            if(lowT && lowR && highA && lowS && lowH && highB && highI && highN) return 4; //天气型
            if(highT && lowR && lowA && highS && highH && lowB && highI && highN) return 5; //脑补Win
            if(highT && highR && highA && highS && highH && highB && lowI && lowN) return 6; //地球NPC
            if(lowT && highR && highA && lowS && lowH && lowB && lowI && lowN) return 7; //人间清醒
            // 融合品种
            if(highA && highI && highN && !lowT && !highR) return 8; //深夜折学
            if(lowR && lowS && lowI && scores.T<60) return 9; //糊弄学叫兽
            if(highR && highS && highI) return 10; //静音尖叫鸡
            if(Math.abs(scores.S-50)<15 && lowA && highH) return 11; //薛定谔社恐
            if(lowA && highN && highI) return 12; //备忘录文蚝
            if(Math.abs(scores.T-50)<20 && lowR && lowB) return 13; //记忆清空大师
            if(lowH && highN && highB) return 14; //赛博窦娥
            if(highR && highB && lowI) return 15; //佛系杠鲸
            if(Math.abs(scores.T-50)<20 && Math.abs(scores.A-50)<20 && Math.abs(scores.S-50)<20 && highI) return 16; //AI疑似
            if(highS && lowH && highI && highN) return 17; //高敏土豆
            if(highT && lowB && highI) return 18; //囤积P
            if(lowA && lowS && highN) return 19; //精神鼓动家
            if(highR && Math.abs(scores.H-50)<20 && highI) return 20; //高延迟人类
            if(highB && highN && highH) return 21; //善意过分解do
            if(highA && lowB && lowI) return 22; //Prompt大失
            if(highT && lowA && highN && Math.abs(scores.H-50)<20) return 23; //梦导
            return 24; //BUG
        }

        function showResult() {
            const scores = calculateResult();
            const idx = matchPersonality(scores);
            const person = personalities[idx];
            quizDiv.style.display = 'none';
            resultDiv.style.display = 'flex';
            typeName.textContent = person.name;
            reportText.textContent = person.report;
            drawFace(ctx, faceStyles[idx]);
        }

        restartBtn.addEventListener('click', ()=>{
            currentQ = 0;
            answers = new Array(24).fill(-1);
            resultDiv.style.display = 'none';
            quizDiv.style.display = 'block';
            renderQuestion();
        });

        // 启动
        renderQuestion();
    })();
</script>
</body>
</html>
